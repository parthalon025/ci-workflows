name: Nightly Deep Scan
on:
  workflow_call:
    inputs:
      language:
        type: string
        default: 'python'
      python-version:
        type: string
        default: '3.12'
      node-version:
        type: string
        default: '20'
      full-test-args:
        type: string
        default: '--timeout=120 -q -n auto'
      pytest-markers:
        type: string
        default: 'not ollama'
      install-command:
        type: string
        default: 'pip install -e ".[dev]"'
      working-directory:
        type: string
        default: '.'
      runs-on:
        type: string
        default: 'ubuntu-latest'
        description: 'Runner label — set to self-hosted for self-hosted runners'

jobs:
  dep-audit:
    name: Dependency Audit
    runs-on: ${{ inputs.runs-on }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Python audit
        if: ${{ inputs.language == 'python' || inputs.language == 'mixed' }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ inputs.python-version }}
      - name: Run pip-audit
        if: ${{ inputs.language == 'python' || inputs.language == 'mixed' }}
        run: |
          pip install pip-audit
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          elif [ -f pyproject.toml ]; then
            pip install .
            pip-audit
          fi
      - name: Node audit
        if: ${{ inputs.language == 'node' || inputs.language == 'mixed' }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ inputs.node-version }}
      - name: Run npm audit
        if: ${{ inputs.language == 'node' || inputs.language == 'mixed' }}
        run: |
          npm ci
          npm audit --omit=dev || true

  full-test:
    name: Full Test Suite
    runs-on: ${{ inputs.runs-on }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Setup Python
        if: ${{ inputs.language == 'python' || inputs.language == 'mixed' }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ inputs.python-version }}
      - name: Python tests
        if: ${{ inputs.language == 'python' || inputs.language == 'mixed' }}
        env:
          PYTEST_ARGS: ${{ inputs.full-test-args }}
          PYTEST_MARKERS: ${{ inputs.pytest-markers }}
          INSTALL_CMD: ${{ inputs.install-command }}
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install pytest pytest-timeout pytest-xdist
          # shellcheck disable=SC2086
          .venv/bin/$INSTALL_CMD
          MARKER_ARG=""
          if [ -n "$PYTEST_MARKERS" ]; then
            MARKER_ARG="-m ${PYTEST_MARKERS}"
          fi
          # shellcheck disable=SC2086
          eval .venv/bin/python -m pytest "$PYTEST_ARGS" $MARKER_ARG
      - name: Setup Node
        if: ${{ inputs.language == 'node' || inputs.language == 'mixed' }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ inputs.node-version }}
      - name: Node tests
        if: ${{ inputs.language == 'node' || inputs.language == 'mixed' }}
        run: |
          npm ci
          npm test

  secrets-scan:
    name: Full Secret Scan
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL
    runs-on: ${{ inputs.runs-on }}
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: github/codeql-action/init@ebcb5b36ded6bead4ceefea6a8bc4cc885255bb3  # v3
        with:
          languages: ${{ inputs.language == 'mixed' && 'python' || inputs.language }}
      - uses: github/codeql-action/autobuild@ebcb5b36ded6bead4ceefea6a8bc4cc885255bb3  # v3
      - uses: github/codeql-action/analyze@ebcb5b36ded6bead4ceefea6a8bc4cc885255bb3  # v3
