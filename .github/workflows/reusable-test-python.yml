name: Test Python
on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: '3.12'
      pytest-args:
        type: string
        default: '--timeout=120 -x -q -n auto'
      pytest-markers:
        type: string
        default: 'not ollama'
      install-command:
        type: string
        default: 'pip install -e ".[dev]"'
      coverage:
        type: boolean
        default: true
      codecov-upload:
        type: boolean
        default: false
      coverage-source:
        type: string
        default: '.'
        description: 'Path to measure coverage for (e.g. src/pensiv). Defaults to current directory.'
      working-directory:
        type: string
        default: '.'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ inputs.python-version }}
      - name: Create venv and install
        env:
          INSTALL_CMD: ${{ inputs.install-command }}
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install pytest pytest-timeout pytest-xdist
          # bash -c preserves shell quoting in INSTALL_CMD (e.g. extras like ".[dev]")
          bash -c ".venv/bin/$INSTALL_CMD"
      - name: Run tests
        env:
          COVERAGE: ${{ inputs.coverage }}
          COVERAGE_SOURCE: ${{ inputs.coverage-source }}
          PYTEST_ARGS: ${{ inputs.pytest-args }}
          PYTEST_MARKERS: ${{ inputs.pytest-markers }}
        run: |
          COV_ARGS=""
          if [ "$COVERAGE" = "true" ]; then
            .venv/bin/python -m pip install pytest-cov
            COV_ARGS="--cov=${COVERAGE_SOURCE} --cov-report=xml"
          fi
          if [ -n "$PYTEST_MARKERS" ]; then
            # shellcheck disable=SC2086
            .venv/bin/python -m pytest $PYTEST_ARGS $COV_ARGS -m "$PYTEST_MARKERS"
          else
            # shellcheck disable=SC2086
            .venv/bin/python -m pytest $PYTEST_ARGS $COV_ARGS
          fi
      - name: Upload coverage
        if: ${{ inputs.codecov-upload && inputs.coverage }}
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad  # v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
