name: Release Please
on:
  workflow_call:
    inputs:
      release-type:
        type: string
        default: 'simple'
      runs-on:
        type: string
        default: 'ubuntu-latest'
        description: 'Runner label — set to self-hosted for self-hosted runners'

jobs:
  release-please:
    name: Release
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38  # v4
        with:
          release-type: ${{ inputs.release-type }}
