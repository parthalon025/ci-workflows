name: Release Please
on:
  workflow_call:
    inputs:
      release-type:
        type: string
        default: 'simple'

jobs:
  release-please:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38  # v4
        with:
          release-type: ${{ inputs.release-type }}
